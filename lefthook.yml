pre-commit:
  parallel: true
  jobs:
    - name: fmt
      glob: "*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true
    - name: imports
      glob: "*.go"
      run: goimports -w {staged_files}
      stage_fixed: true
    - name: lint
      run: golangci-lint run ./...

pre-push:
  jobs:
    - name: test
      run: go test ./...
